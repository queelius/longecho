<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ name }}</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --muted: #666666;
            --border: #e0e0e0;
            --card-bg: #f8f9fa;
            --link: #0066cc;
            --link-hover: #004499;
            --code-bg: #f4f4f4;
            --search-bg: #f8f9fa;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a1a;
                --text: #e0e0e0;
                --muted: #999999;
                --border: #333333;
                --card-bg: #242424;
                --link: #6699ff;
                --link-hover: #99bbff;
                --code-bg: #2a2a2a;
                --search-bg: #242424;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: var(--text);
            background: var(--bg);
        }

        .container { max-width: 900px; margin: 0 auto; padding: 2rem; }

        header { margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
        h1 { font-weight: 600; margin-bottom: 0.5rem; }
        .description { color: var(--muted); font-size: 1.1rem; }

        .search-container { margin-bottom: 1.5rem; }

        .search-box {
            padding: 0.75rem 1rem;
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--search-bg);
            color: var(--text);
            font-size: 1rem;
        }

        .search-box:focus { outline: 2px solid var(--link); border-color: var(--link); }

        .result-count {
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
            color: var(--muted);
        }

        .breadcrumb { margin-bottom: 1rem; font-size: 0.9rem; }
        .breadcrumb a { color: var(--link); text-decoration: none; cursor: pointer; }
        .breadcrumb a:hover { text-decoration: underline; }

        .sources { display: grid; gap: 1rem; }

        .source-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .source-card:hover {
            border-color: var(--link);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .source-name { font-weight: 600; font-size: 1.1rem; margin-bottom: 0.25rem; }
        .source-desc { color: var(--muted); font-size: 0.95rem; }
        .source-meta { display: flex; gap: 1rem; margin-top: 0.5rem; font-size: 0.85rem; color: var(--muted); }

        .detail-section { margin-top: 1.5rem; }

        .metadata {
            padding: 1rem;
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }

        .metadata-row { display: flex; margin-bottom: 0.25rem; }
        .metadata-label { font-weight: 500; width: 120px; flex-shrink: 0; }
        .metadata-value { color: var(--muted); }

        .site-link {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            background: var(--link);
            color: var(--bg);
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }
        .site-link:hover { opacity: 0.85; }

        .children-section { margin-top: 2rem; }
        .children-section h3 { margin-bottom: 0.75rem; }

        .readme-content h1,
        .readme-content h2,
        .readme-content h3 { margin-top: 1.5rem; margin-bottom: 0.5rem; }
        .readme-content p { margin-bottom: 1rem; }
        .readme-content pre {
            background: var(--code-bg);
            padding: 1rem;
            border-radius: 4px;
            overflow-x: auto;
        }
        .readme-content code {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.9rem;
        }
        .readme-content table {
            border-collapse: collapse;
            margin-bottom: 1rem;
        }
        .readme-content th, .readme-content td {
            border: 1px solid var(--border);
            padding: 0.5rem 0.75rem;
            text-align: left;
        }
        .readme-content th { background: var(--card-bg); }

        .data-files { margin-top: 1.5rem; }
        .data-files h3 { margin-bottom: 0.75rem; }
        .file-link {
            display: block;
            padding: 0.5rem 0;
            color: var(--link);
            text-decoration: none;
            border-bottom: 1px solid var(--border);
        }
        .file-link:hover { text-decoration: underline; }
        .file-link:last-child { border-bottom: none; }

        footer {
            margin-top: 3rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            color: var(--muted);
            font-size: 0.85rem;
        }

        footer a { color: var(--link); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        .empty-state { text-align: center; padding: 3rem; color: var(--muted); }

        [hidden] { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="page-title">{{ name }}</h1>
            <p class="description" id="page-desc">{{ description }}</p>
        </header>

        <div id="breadcrumb" class="breadcrumb" hidden></div>

        <div class="search-container" id="search-container">
            <input type="text" class="search-box" id="search"
                   placeholder="Search sources..." autocomplete="off">
            <div class="result-count" id="result-count"></div>
        </div>

        <main id="main">
            <div class="sources" id="source-list"></div>
            <div id="source-detail" hidden></div>
        </main>

        <footer>
            <p>
                Generated by <a href="https://github.com/queelius/longecho">longecho</a>
                &middot; longecho archive
                {% if generated_at %}&middot; {{ generated_at }}{% endif %}
            </p>
        </footer>
    </div>

    <script>
    (function() {
        var ROOT = {{ root_data|tojson }};

        var listEl = document.getElementById('source-list');
        var detailEl = document.getElementById('source-detail');
        var searchEl = document.getElementById('search');
        var breadcrumbEl = document.getElementById('breadcrumb');
        var titleEl = document.getElementById('page-title');
        var descEl = document.getElementById('page-desc');
        var resultCountEl = document.getElementById('result-count');

        // Navigation stack: array of source objects for breadcrumb.
        // Empty = root (home view).
        var navStack = [];

        // Track the currently displayed source so search can return to it.
        var currentSource = ROOT;

        // Extract plain text from HTML for full-text search
        function htmlToText(html) {
            var div = document.createElement('div');
            div.innerHTML = html;
            return div.textContent || '';
        }

        // Recursively build search index for all sources
        function buildSearchIndex(sources) {
            for (var i = 0; i < sources.length; i++) {
                var s = sources[i];
                var parts = [s.name, s.description];
                if (s.readme_html) parts.push(htmlToText(s.readme_html));
                if (s.frontmatter) {
                    var keys = Object.keys(s.frontmatter);
                    for (var k = 0; k < keys.length; k++) {
                        parts.push(String(s.frontmatter[keys[k]]));
                    }
                }
                s._searchText = parts.join(' ').toLowerCase();
                if (s.children && s.children.length) {
                    buildSearchIndex(s.children);
                }
            }
        }
        buildSearchIndex([ROOT]);

        // Flatten descendants (excluding root) for global search.
        // The root is always "here" in the navigation.
        function flattenSources(sources) {
            var result = [];
            for (var i = 0; i < sources.length; i++) {
                result.push(sources[i]);
                if (sources[i].children && sources[i].children.length) {
                    result = result.concat(flattenSources(sources[i].children));
                }
            }
            return result;
        }

        var ALL_SOURCES = flattenSources(ROOT.children || []);

        // Plain text search: case-insensitive substring match against search index
        function matchesQuery(source, text) {
            if (!text) return true;
            return source._searchText.indexOf(text.toLowerCase()) !== -1;
        }

        // Build a source card element
        function createCard(source, idx, attrName) {
            var card = document.createElement('div');
            card.className = 'source-card';
            card.setAttribute('data-' + attrName, idx);

            var nameDiv = document.createElement('div');
            nameDiv.className = 'source-name';
            nameDiv.textContent = source.name;
            if (source.children && source.children.length) {
                nameDiv.textContent += ' (' + source.children.length + ')';
            }
            card.appendChild(nameDiv);

            var descDiv = document.createElement('div');
            descDiv.className = 'source-desc';
            descDiv.textContent = source.description;
            card.appendChild(descDiv);

            var metaParts = [];
            if (source.durable_formats && source.durable_formats.length) {
                metaParts.push(source.durable_formats.join(', '));
            }
            var fm = source.frontmatter || {};
            if (fm.author) metaParts.push(fm.author);
            if (fm.datetime) metaParts.push(String(fm.datetime));

            if (metaParts.length) {
                var metaDiv = document.createElement('div');
                metaDiv.className = 'source-meta';
                for (var i = 0; i < metaParts.length; i++) {
                    var span = document.createElement('span');
                    span.textContent = metaParts[i];
                    metaDiv.appendChild(span);
                }
                card.appendChild(metaDiv);
            }

            return card;
        }

        // Render a flat list of search results (used only when searching).
        function renderSearchResults(query) {
            listEl.textContent = '';
            var count = 0;

            for (var i = 0; i < ALL_SOURCES.length; i++) {
                if (!matchesQuery(ALL_SOURCES[i], query)) continue;
                count++;
                var card = createCard(ALL_SOURCES[i], i, 'flat');
                listEl.appendChild(card);
            }

            resultCountEl.textContent = count + ' of ' + ALL_SOURCES.length + ' source(s)';

            if (count === 0) {
                var empty = document.createElement('div');
                empty.className = 'empty-state';
                var p = document.createElement('p');
                p.textContent = 'No sources match your search.';
                empty.appendChild(p);
                listEl.appendChild(empty);
            }
        }

        function renderDetail(source) {
            detailEl.textContent = '';

            // Metadata
            var meta = source.frontmatter || {};
            var metaKeys = Object.keys(meta).filter(function(k) {
                return k !== 'name' && k !== 'description' && k !== 'contents';
            });

            if (metaKeys.length || (source.durable_formats && source.durable_formats.length)) {
                var metaBox = document.createElement('div');
                metaBox.className = 'metadata';

                if (source.durable_formats && source.durable_formats.length) {
                    var row = document.createElement('div');
                    row.className = 'metadata-row';
                    var label = document.createElement('span');
                    label.className = 'metadata-label';
                    label.textContent = 'Formats';
                    var val = document.createElement('span');
                    val.className = 'metadata-value';
                    val.textContent = source.durable_formats.join(', ');
                    row.appendChild(label);
                    row.appendChild(val);
                    metaBox.appendChild(row);
                }

                for (var i = 0; i < metaKeys.length; i++) {
                    var k = metaKeys[i];
                    var row2 = document.createElement('div');
                    row2.className = 'metadata-row';
                    var label2 = document.createElement('span');
                    label2.className = 'metadata-label';
                    label2.textContent = k;
                    var val2 = document.createElement('span');
                    val2.className = 'metadata-value';
                    val2.textContent = String(meta[k]);
                    row2.appendChild(label2);
                    row2.appendChild(val2);
                    metaBox.appendChild(row2);
                }

                detailEl.appendChild(metaBox);
            }

            // Link to source's own interactive site
            if (source.site_url) {
                var siteLink = document.createElement('a');
                siteLink.href = source.site_url;
                siteLink.className = 'site-link';
                siteLink.textContent = 'Open interactive viewer \u2192';
                detailEl.appendChild(siteLink);
            }

            // README content (pre-sanitized server-side by _sanitize_html)
            if (source.readme_html) {
                var readmeDiv = document.createElement('div');
                readmeDiv.className = 'readme-content';
                readmeDiv.innerHTML = source.readme_html;
                detailEl.appendChild(readmeDiv);
            }

            // Data file links
            if (source.data_files && source.data_files.length) {
                var filesDiv = document.createElement('div');
                filesDiv.className = 'data-files';
                var h3 = document.createElement('h3');
                h3.textContent = 'Data Files';
                filesDiv.appendChild(h3);

                for (var j = 0; j < source.data_files.length; j++) {
                    var f = source.data_files[j];
                    var a = document.createElement('a');
                    a.className = 'file-link';
                    a.href = f.path;
                    a.textContent = f.name;
                    filesDiv.appendChild(a);
                }

                detailEl.appendChild(filesDiv);
            }

            // Children as navigable cards
            if (source.children && source.children.length) {
                var childSection = document.createElement('div');
                childSection.className = 'children-section';
                var ch3 = document.createElement('h3');
                ch3.textContent = 'Contents (' + source.children.length + ')';
                childSection.appendChild(ch3);

                var childGrid = document.createElement('div');
                childGrid.className = 'sources';
                for (var c = 0; c < source.children.length; c++) {
                    childGrid.appendChild(createCard(source.children[c], c, 'child'));
                }
                childSection.appendChild(childGrid);

                // Handle clicks on child cards
                childGrid.addEventListener('click', function(e) {
                    var card = e.target.closest('.source-card');
                    if (card && card.dataset.child !== undefined) {
                        var childIdx = parseInt(card.dataset.child, 10);
                        navigateTo(source.children[childIdx]);
                    }
                });

                detailEl.appendChild(childSection);
            }
        }

        function renderBreadcrumb() {
            breadcrumbEl.textContent = '';

            if (navStack.length === 0) {
                breadcrumbEl.hidden = true;
                return;
            }

            // Root link (back to home)
            var rootLink = document.createElement('a');
            rootLink.textContent = ROOT.name;
            rootLink.onclick = function() { navigateToRoot(); };
            breadcrumbEl.appendChild(rootLink);

            // Each nav stack entry
            for (var i = 0; i < navStack.length; i++) {
                breadcrumbEl.appendChild(document.createTextNode(' / '));
                if (i < navStack.length - 1) {
                    var link = document.createElement('a');
                    link.textContent = navStack[i].name;
                    (function(idx) {
                        link.onclick = function() { navigateBack(idx); };
                    })(i);
                    breadcrumbEl.appendChild(link);
                } else {
                    breadcrumbEl.appendChild(document.createTextNode(navStack[i].name));
                }
            }

            breadcrumbEl.hidden = false;
        }

        // Show a source's detail view. The home view is the detail view of
        // ROOT, every view in the SFA goes through this function.
        function showDetailView(source) {
            currentSource = source;
            titleEl.textContent = source.name;
            descEl.textContent = source.description;
            resultCountEl.textContent = '';
            listEl.hidden = true;
            detailEl.hidden = false;
            renderDetail(source);
        }

        function navigateToRoot() {
            navStack = [];
            searchEl.value = '';
            renderBreadcrumb();
            showDetailView(ROOT);
        }

        function navigateTo(source) {
            navStack.push(source);
            searchEl.value = '';
            renderBreadcrumb();
            showDetailView(source);
        }

        function navigateBack(idx) {
            // Pop stack back to idx (inclusive) and show that source.
            navStack = navStack.slice(0, idx + 1);
            searchEl.value = '';
            renderBreadcrumb();
            showDetailView(navStack[navStack.length - 1]);
        }

        // Handle clicks on search result cards in listEl.
        // Child cards in the detail view have their own handler (set up
        // per-render inside renderDetail).
        listEl.addEventListener('click', function(e) {
            var card = e.target.closest('.source-card');
            if (!card) return;
            if (card.dataset.flat !== undefined) {
                navigateTo(ALL_SOURCES[parseInt(card.dataset.flat, 10)]);
            }
        });

        function onSearchInput() {
            var query = searchEl.value.trim();
            if (query) {
                // Show flat search results over all descendants.
                listEl.hidden = false;
                detailEl.hidden = true;
                renderSearchResults(query);
            } else {
                // Empty query: return to the current detail view.
                showDetailView(currentSource);
            }
        }

        searchEl.addEventListener('input', onSearchInput);

        navigateToRoot();
    })();
    </script>
</body>
</html>
